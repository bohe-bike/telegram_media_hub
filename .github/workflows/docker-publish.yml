name: Build & Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master

env:
  IMAGE: sbkdockerhub/telegram_media_hub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. 检出代码 ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 设置 QEMU（用于多平台构建 arm64） ──────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. 初始化 BuildKit builder ────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. 生成镜像标签 ───────────────────────────────────────────
      # main/master 分支 → :latest
      # PR             → 只构建，不推送（no-push）
      # tag v1.1.0     → :1.1.0 + :latest（仅保留精确版本号和 latest）
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 5. 登录 Docker Hub（PR 时跳过） ──────────────────────────
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 6. 构建 & 推送 ────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit 层缓存：用 GitHub Actions Cache 加速重复构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
