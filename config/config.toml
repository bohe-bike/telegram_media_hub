# Telegram Media Hub – 配置文件
# 可直接编辑此文件，也可通过 Web 界面（Settings 标签页）修改。
# 所有更改在重启服务后生效。

# ============================================================
# Telegram
# ============================================================
tg_api_id = 0
tg_api_hash = ""
tg_session_name = "media_hub"
tg_phone_number = ""
# 需要监控的聊天 ID（多个用逗号分隔，留空则监控所有会话）
tg_monitored_chats = ""

# ============================================================
# 基础设施
# ============================================================
database_url = "postgresql+asyncpg://postgres:postgres@postgres:5432/media_hub"
redis_url = "redis://redis:6379/0"
metube_url = "http://metube:8081"

# ============================================================
# 存储路径
# ============================================================
storage_root = "/media"
temp_dir = "/media/temp"

# ============================================================
# 重试
# ============================================================
max_retries = 5
retry_base_delay = 30

# ============================================================
# 代理池
# ============================================================
# 代理地址列表，多个用逗号分隔,例如 "http://proxy1:7890,socks5://proxy2:1080"
proxy_pool = ""
# 连续失败多少次后将代理标记为 FAILED
proxy_fail_threshold = 3
# 自动健康检查间隔（秒），设为 0 则关闭自动检查
proxy_check_interval = 300

# ============================================================
# 通知
# ============================================================
# 下载完成后在 TG 聊天中回复通知
tg_notify_on_complete = true
# 下载最终失败后在 TG 聊天中回复通知
tg_notify_on_fail = true
# 回复方式: "user" = 以自己身份回复, "bot" = 以机器人身份回复（默认）
tg_notify_mode = "bot"
# Bot Token（从 @BotFather 获取），tg_notify_mode = "bot" 时必填
tg_bot_token = ""

# ============================================================
# 安全
# ============================================================
# 设置非空字符串后，所有 API 请求须携带 X-API-Key 请求头。
# 留空则不启用认证（适合首次配置时使用）。
api_secret_key = ""
